<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Zadań</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="py-5"> 
    <div class="container container-custom">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Lista Zadań</h2>
                
                <div class="bg-light p-3 rounded mb-4 border">
                    <input type="text" id="wyszukiwarka" class="form-control mb-2" placeholder="Szukaj zadania...">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="ignorujWielkosc" checked>
                        <label class="form-check-label" for="ignorujWielkosc">Ignoruj wielkość liter</label>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="text" id="kategoriaWpis" class="form-control" list="kategorieLista" placeholder="Kategoria">
                    <datalist id="kategorieLista">
                        <option value="Mało pilne"></option>
                        <option value="Pilne"></option>
                        <option value="Na wczoraj"></option>
                    </datalist>
                    <input type="text" id="wpis" class="form-control w-50" placeholder="Co masz dziś do zrobienia?">
                    <button class="btn btn-primary px-4" id="przyciskDodaj">Dodaj</button>
                </div>
                
                <div id="komunikatBledu" class="alert alert-danger d-none py-2" role="alert">
                    Treść zadania nie może być pusta!
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <small class="text-muted">Kliknij zadanie, aby ukończyć.</small>
                    <button id="cofnij" class="btn btn-warning btn-sm" disabled>Cofnij usunięcie</button>
                </div>

                <div id="kontenerList"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPotwierdzenia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Potwierdź usunięcie</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Zamknij"></button>
                </div>
                <div class="modal-body">
                    <p id="tekstModala" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
                    <button type="button" class="btn btn-danger" id="btnTak">Usuń trwale</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
